<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑貓動態避險導航 (台南中西區 POC)</title>
    <style>
        body { font-family: '微軟正黑體', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .device-simulator { width: 375px; height: 750px; background-color: #fff; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; position: relative; border: 8px solid #333; }
        .header { background-color: #F8C300; color: #222; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; display: flex; justify-content: space-between; }
        .map-area { height: 450px; background-color: #e5e3df; position: relative; overflow: hidden; }
        /* 模擬地圖路徑 */
        .road-main { position: absolute; top: 0; left: 150px; width: 60px; height: 100%; background: #fff; border-left: 2px dashed #ccc; border-right: 2px dashed #ccc; }
        .road-alley { position: absolute; top: 200px; left: 0; width: 150px; height: 30px; background: #fff; }
        .poi-target { position: absolute; top: 195px; left: 50px; font-size: 24px; }
        .truck { position: absolute; bottom: 50px; left: 165px; font-size: 28px; transition: all 2s ease-in-out; }
        
        .info-panel { padding: 20px; background: #fff; height: calc(100% - 450px); box-sizing: border-box; }
        .task-card { background: #f9f9f9; padding: 15px; border-radius: 10px; border-left: 5px solid #4CAF50; margin-bottom: 15px; }
        
        /* 警報彈窗樣式 */
        .alert-modal { position: absolute; bottom: -300px; left: 0; width: 100%; background: #fff; border-top-left-radius: 20px; border-top-right-radius: 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); transition: bottom 0.4s ease-out; padding: 20px; box-sizing: border-box; z-index: 10; }
        .alert-modal.show { bottom: 0; }
        .alert-header { color: #D32F2F; font-weight: bold; font-size: 20px; display: flex; align-items: center; margin-bottom: 10px; }
        .alert-body { font-size: 14px; color: #555; margin-bottom: 20px; line-height: 1.5; }
        
        .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-primary { background: #4CAF50; color: white; }
        .btn-danger { background: #fff; color: #D32F2F; border: 1px solid #D32F2F; }
        
        /* 開發者模擬按鈕 (簡報展示用) */
        .demo-controls { position: absolute; right: -150px; top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .demo-btn { padding: 10px; cursor: pointer; background: #333; color: #fff; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="demo-controls">
        <button class="demo-btn" onclick="simulateDriving()">1. 駛近神農街口</button>
        <button class="demo-btn" onclick="resetDemo()">0. 重置</button>
    </div>

    <div class="device-simulator">
        <div class="header">
            <span>📦 黑貓副駕</span>
            <span>⏱️ 14:30</span>
        </div>
        
        <div class="map-area" id="mapArea">
            <div class="road-main"></div>
            <div class="road-alley"></div>
            <div class="poi-target">📍</div>
            <div class="truck" id="truckIcon">🚚</div>
        </div>

        <div class="info-panel">
            <div class="task-card">
                <div style="font-size: 12px; color: #888;">下一站：單號 8849201</div>
                <div style="font-size: 16px; font-weight: bold; margin: 5px 0;">台南市中西區神農街 XX 號</div>
                <div style="font-size: 14px; color: #555;">常溫包裹 / 3 件</div>
            </div>
            <div style="text-align: center; color: #aaa; font-size: 12px;">系統運作中... AI 路線守護中</div>
        </div>

        <div class="alert-modal" id="alertModal">
            <div class="alert-header">⚠️ 前方巷弄高風險預警！</div>
            <div class="alert-body">
                系統偵測到 <strong>環保局垃圾車</strong> 預計於 3 分鐘後進入神農街，且目前該路段有 1999 違停通報。<br><br>
                <span style="color:#D32F2F; font-weight:bold;">駛入卡死機率：87% (預估耗時 25 分鐘)</span>
            </div>
            <button class="btn btn-primary" onclick="acceptAI()">✅ 停在海安路口 (步行 50m / 預估 5 分鐘)</button>
            <button class="btn btn-danger" onclick="ignoreAI()">❌ 忽略警告，堅持開進去</button>
        </div>
    </div>

    <script>
        function simulateDriving() {
            // 模擬卡車開到路口
            document.getElementById('truckIcon').style.bottom = '180px';
            document.getElementById('truckIcon').style.left = '165px';
            
            // 延遲 1 秒後跳出 AI 警報
            setTimeout(() => {
                document.getElementById('alertModal').classList.add('show');
                // 將任務卡片邊框變紅，視覺化風險
                document.querySelector('.task-card').style.borderLeftColor = '#D32F2F';
            }, 1000);
        }

        function acceptAI() {
            document.getElementById('alertModal').classList.remove('show');
            document.querySelector('.task-card').style.borderLeftColor = '#4CAF50';
            alert("AI 已將「海安路虛擬卸貨格」設定為導航終點。司機安全下車步行！");
            document.getElementById('truckIcon').style.left = '150px'; // 靠邊停
        }

        function ignoreAI() {
            document.getElementById('alertModal').classList.remove('show');
            alert("司機駛入神農街。後台已記錄風險偏移，若發生延誤將不計入司機 KPI 懲罰。");
            document.getElementById('truckIcon').style.left = '100px'; // 開進巷子
        }

        function resetDemo() {
            document.getElementById('truckIcon').style.bottom = '50px';
            document.getElementById('truckIcon').style.left = '165px';
            document.getElementById('alertModal').classList.remove('show');
            document.querySelector('.task-card').style.borderLeftColor = '#4CAF50';
        }
    </script>
</body>
</html>
